component: Directory Tree
props:
  - name: disk
    description: The filesystem disk to use for reading files
    type: select
    default: local
    options:
      - local
      - public
      - s3
      - project
  - name: baseDir
    description: The base directory path to display
    type: text
    default: ''
  - name: exclude
    description: Array of directory names to exclude from the tree
    type: text
    default: '[]'
  - name: title
    description: Title displayed in the header. Defaults to the folder name from baseDir.
    type: text
    default: ''
  - name: showToolbar
    description: Show the toolbar with title and file/folder creation buttons
    type: select
    default: 'true'
    options:
      - 'true'
      - 'false'
  - name: readonly
    description: When true, hides file/folder creation UI and blocks write operations server-side
    type: select
    default: 'false'
    options:
      - 'true'
      - 'false'
  - name: animateCollapse
    description: When true, adds x-collapse to folder containers for smooth expand/collapse animations. Requires the Alpine.js Collapse plugin.
    type: select
    default: 'false'
    options:
      - 'true'
      - 'false'
