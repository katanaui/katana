component: Modal
props:
  - name: open
    description: Controls the initial open state of the modal
    type: boolean
    default: false
  - name: close_button
    description: Show or hide the close button in the modal header
    type: boolean
    default: true
slots:
  - name: slot
    description: The main modal content
    default: '<x-katana.button>Open Modal</x-katana.button>
      <x-slot:content>
          <h2 class="-translate-y-1.5">Modal Title</h2>
          <p class="text-base opacity-60">The main body content for your modal will go here. Add text, images, a form, and more.</p>
      </x-slot:content>'
  - name: trigger
    description: Custom trigger element to open the modal
    default: '<x-katana.button variant="outline">Open</x-katana.button>'
  - name: title
    description: The modal title text
    default: "Modal Title"
